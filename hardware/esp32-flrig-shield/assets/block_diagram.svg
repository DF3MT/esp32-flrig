<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="820" height="420" fill="url(#bg)" rx="12"/>
  <text x="410" y="36" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">ESP32-FLRIG Interface Shield  Rev A</text>
  <text x="410" y="58" fill="#94a3b8" font-size="13" text-anchor="middle">RJ45: Strom + CAT (5V TTL) + Line-Audio</text>

  <!-- CYD -->
  <rect x="40" y="90" width="150" height="120" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="115" y="125" fill="#e0f2fe" font-size="14" font-weight="600" text-anchor="middle">ESP32 CYD</text>
  <text x="115" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">GPIO 16/17 CAT</text>
  <text x="115" y="166" fill="#94a3b8" font-size="11" text-anchor="middle">GPIO 4/22/25/26 I2S</text>
  <text x="115" y="190" fill="#64748b" font-size="10" text-anchor="middle">WiFi Æ rigctld :4532</text>

  <!-- Shield -->
  <rect x="230" y="70" width="360" height="260" rx="10" fill="#0f766e22" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)"/>
  <text x="410" y="98" fill="#6ee7b7" font-size="15" font-weight="700" text-anchor="middle">Interface PCB</text>

  <rect x="250" y="115" width="90" height="50" rx="6" fill="#134e4a" stroke="#2dd4bf"/>
  <text x="295" y="145" fill="#ccfbf1" font-size="11" text-anchor="middle">TXS0102</text>

  <rect x="360" y="115" width="90" height="50" rx="6" fill="#134e4a" stroke="#2dd4bf"/>
  <text x="405" y="138" fill="#ccfbf1" font-size="11" text-anchor="middle">PCM5102</text>
  <text x="405" y="154" fill="#99f6e4" font-size="9" text-anchor="middle">I2S DAC</text>

  <rect x="470" y="115" width="90" height="50" rx="6" fill="#134e4a" stroke="#2dd4bf"/>
  <text x="515" y="138" fill="#ccfbf1" font-size="11" text-anchor="middle">INMP441</text>
  <text x="515" y="154" fill="#99f6e4" font-size="9" text-anchor="middle">I2S IN</text>

  <rect x="300" y="190" width="220" height="44" rx="6" fill="#164e63" stroke="#38bdf8"/>
  <text x="410" y="218" fill="#e0f2fe" font-size="12" text-anchor="middle">AMS1117-3.3 + F1 + D1 OR</text>

  <rect x="320" y="250" width="180" height="56" rx="6" fill="#312e81" stroke="#a78bfa"/>
  <text x="410" y="282" fill="#ede9fe" font-size="13" font-weight="600" text-anchor="middle">RJ45  ESP32-FLRIG-1</text>

  <!-- Radio -->
  <rect x="630" y="90" width="150" height="120" rx="8" fill="#422006" stroke="#fbbf24" stroke-width="2"/>
  <text x="705" y="125" fill="#fef3c7" font-size="14" font-weight="600" text-anchor="middle">Funkgerõt</text>
  <text x="705" y="148" fill="#fcd34d" font-size="11" text-anchor="middle">CAT TTL 5V</text>
  <text x="705" y="166" fill="#fcd34d" font-size="11" text-anchor="middle">Line IN / OUT</text>
  <text x="705" y="190" fill="#a8a29e" font-size="10" text-anchor="middle">+5V optional</text>

  <!-- Arrows -->
  <path d="M190 150 L228 150" stroke="#38bdf8" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M550 278 L628 150" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="590" y="210" fill="#94a3b8" font-size="10" transform="rotate(-38 590 210)">1ū Cat-5e Kabel</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect x="40" y="300" width="740" height="90" rx="8" fill="#020617" stroke="#334155"/>
  <text x="60" y="328" fill="#94a3b8" font-size="12">RJ45: 1=+5V  2=GND  3=CAT_TXÉFunk  4=CAT_RXÆFunk  5=AF_IN  6=AF_OUT  7=GND  8=NC</text>
  <text x="60" y="352" fill="#64748b" font-size="11">PC: WSJT-X / flrig ³ber WiFi (rigctl -m 2 -r ESP:4532)  Audio optional UDP :4533/:4534</text>
  <text x="60" y="374" fill="#64748b" font-size="11">JLCPCB: 2-layer Ę KiCad in hardware/esp32-flrig-shield/kicad/</text>
</svg>
