<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00cc88"/>
    </marker>
    <marker id="iso" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <rect x="0" y="0" width="6" height="6" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#1a1a2e"/>
  <text x="450" y="32" fill="#00ff88" font-size="20" text-anchor="middle" font-weight="bold">ESP32-FLRIG Shield Rev C ? galvanically isolated</text>
  <text x="450" y="54" fill="#94a3b8" font-size="12" text-anchor="middle">CAT = Computer Aided Transceiver ? no shared ground between rigs</text>

  <rect x="300" y="80" width="300" height="200" rx="8" fill="#16213e" stroke="#00ff88" stroke-width="2"/>
  <text x="450" y="108" fill="#eee" font-size="14" text-anchor="middle">ESP32-S3 + Firmware</text>
  <text x="450" y="128" fill="#aaa" font-size="11" text-anchor="middle">GND_ESP only inside box</text>
  <text x="450" y="148" fill="#aaa" font-size="11" text-anchor="middle">rigctld ? WiFi audio ? rotctld :4535</text>

  <rect x="40" y="120" width="170" height="100" rx="6" fill="#0f3460" stroke="#4cc9f0"/>
  <text x="125" y="150" fill="#eee" font-size="13" text-anchor="middle">Radio A</text>
  <text x="125" y="170" fill="#aaa" font-size="10" text-anchor="middle">RJ45 ? GND_RADIO_A</text>
  <text x="125" y="188" fill="#f59e0b" font-size="9" text-anchor="middle">U1 ISO7741 + T1/T2</text>

  <rect x="40" y="260" width="170" height="90" rx="6" fill="#0f3460" stroke="#f4a261"/>
  <text x="125" y="290" fill="#eee" font-size="13" text-anchor="middle">Radio B ? J5</text>
  <text x="125" y="310" fill="#f59e0b" font-size="9" text-anchor="middle">U6 ADuM4160 ? GND_USB_B</text>

  <rect x="40" y="370" width="170" height="70" rx="6" fill="#0f3460" stroke="#f4a261"/>
  <text x="125" y="400" fill="#eee" font-size="13" text-anchor="middle">Radio C ? J6</text>
  <text x="125" y="418" fill="#f59e0b" font-size="9" text-anchor="middle">U7 ADuM4160 ? GND_USB_C</text>

  <rect x="690" y="160" width="170" height="80" rx="6" fill="#0f3460" stroke="#e9c46a"/>
  <text x="775" y="195" fill="#eee" font-size="13" text-anchor="middle">Rotor J7</text>
  <text x="775" y="215" fill="#aaa" font-size="10" text-anchor="middle">GPIO only (GND_ESP)</text>

  <rect x="690" y="300" width="170" height="90" rx="6" fill="#0f3460" stroke="#9b5de5"/>
  <text x="775" y="335" fill="#eee" font-size="13" text-anchor="middle">PC / WSJT-X</text>
  <text x="775" y="355" fill="#aaa" font-size="10" text-anchor="middle">WiFi (no radio GND)</text>

  <line x1="210" y1="170" x2="300" y2="150" stroke="#00cc88" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="305" x2="300" y2="200" stroke="#00cc88" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="405" x2="300" y2="240" stroke="#00cc88" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="200" x2="690" y2="200" stroke="#00cc88" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="180" x2="690" y2="330" stroke="#9b5de5" stroke-width="2" marker-end="url(#arr)"/>

  <text x="255" y="158" fill="#f59e0b" font-size="14">?</text>
  <text x="255" y="298" fill="#f59e0b" font-size="14">?</text>
  <text x="255" y="398" fill="#f59e0b" font-size="14">?</text>
  <text x="230" y="145" fill="#f59e0b" font-size="8">isolator</text>
</svg>
