; ESP32 CAT Remote Panel – ICOM/Yaesu + flrig/hamlib rigctld
; Hardware: ESP32-2432S028 (Cheap Yellow Display) or generic ILI9341+XPT2046

[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    lovyan03/LovyanGFX @ ^1.1.16
    lvgl/lvgl @ ^8.3.11
    me-no-dev/ESPAsyncWebServer @ ^3.6.0
    me-no-dev/AsyncTCP @ ^3.3.2
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_CYD=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -Os
lib_extra_dirs = lib

[env:esp32-tdisplay]
extends = env:esp32-cyd
upload_speed = 921600
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_TDISPLAY=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -Os

[env:esp32-generic]
extends = env:esp32-cyd
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_GENERIC=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -Os
