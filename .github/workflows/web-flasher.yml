name: Web Flasher (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "data/**"
      - "platformio.ini"
      - "lib/**"
      - "flasher/**"
      - "scripts/build_flasher_assets.sh"
      - ".github/workflows/web-flasher.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build flasher assets
        run: ./scripts/build_flasher_assets.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flasher

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
